<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>営業先一覧 | 文化施設 営業管理</title>
    <link rel="stylesheet" href="./styles.css?v=20260722-hardening" />
  </head>
  <body>
    <div class="app-shell list-only-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Venue List</p>
          <h1>営業先一覧</h1>
        </div>
        <div class="topbar-actions">
          <a class="top-alert-count is-empty" id="topAlertCount" href="#alertDialog" aria-label="要確認 0件">
            <span>要確認</span>
            <strong id="topAlertCountNumber">0</strong>
            <span>件</span>
          </a>
          <a class="secondary-link" href="./index.html">管理画面</a>
          <a class="secondary-link" id="adminHistoryLink" href="./history.html" hidden>履歴・集計</a>
          <button class="icon-button" id="exportCsvButton" type="button" title="CSVを書き出す" aria-label="CSVを書き出す">
            <span aria-hidden="true">CSV</span>
          </button>
          <button class="primary-button" id="newVenueButton" type="button">新規施設</button>
          <button class="secondary-button" id="logoutButton" type="button">ログアウト</button>
        </div>
      </header>

      <main class="workspace">
        <section class="toolbar" aria-label="施設検索と絞り込み">
          <div class="searchbox">
            <label for="searchInput">検索</label>
            <input id="searchInput" type="search" placeholder="施設名、都道府県、管理運営機関、電話番号、先方担当者、営業担当、状態" />
          </div>
          <div class="filters">
            <label>
              状態
              <select id="statusFilter">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              都道府県
              <select id="prefectureFilter">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              営業担当
              <select id="assigneeFilter">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              最終架電入力者
              <select id="lastCallerFilter">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              温度感
              <select id="priorityFilter">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              種別
              <select id="recordTypeFilter">
                <option value="">すべて</option>
                <option value="facility">施設</option>
                <option value="school">学校</option>
              </select>
            </label>
            <label>
              表示
              <select id="visibilityFilter">
                <option value="visible">表示のみ</option>
                <option value="hidden">非表示のみ</option>
                <option value="all">すべて</option>
              </select>
            </label>
            <label>
              並び替え
              <select id="sortSelect">
                <option value="nextActionDate">次回架電が近い順</option>
                <option value="temperature">温度感が高い順</option>
                <option value="hidden">非表示順</option>
                <option value="updated">最終更新が新しい順</option>
                <option value="prefecture">都道府県順</option>
                <option value="name">施設名順</option>
              </select>
            </label>
          </div>
        </section>

        <section class="list-panel full-list" aria-labelledby="venueListTitle">
          <div class="panel-head">
            <h2 id="venueListTitle">営業先一覧</h2>
            <div class="list-head-actions">
              <span class="save-status" id="saveStatus">保存済み</span>
              <button class="secondary-button undo-button" id="undoChangeButton" type="button" hidden>元に戻す</button>
              <span id="visibleCount">0件</span>
              <details class="column-pin-menu">
                <summary>固定列</summary>
                <div class="column-pin-options" id="pinnedColumnControls"></div>
              </details>
              <details class="column-pin-menu column-visibility-menu">
                <summary>表示列</summary>
                <div class="column-preset-actions" id="columnPresetControls"></div>
                <div class="column-pin-options" id="visibleColumnControls"></div>
              </details>
            </div>
          </div>
          <div class="table-wrap">
            <div class="table-loader" id="tableLoader" role="status" aria-live="polite" hidden>営業先一覧を読み込み中です。</div>
            <table>
              <caption class="sr-only">営業先一覧</caption>
              <thead>
                <tr>
                  <th scope="col">自主事業</th>
                  <th scope="col">施設名</th>
                  <th scope="col">管理運営機関</th>
                  <th scope="col">温度感</th>
                  <th scope="col">通知</th>
                  <th scope="col">通知日数</th>
                  <th scope="col">所在地</th>
                  <th scope="col">電話</th>
                  <th scope="col">アドレス</th>
                  <th scope="col">状態</th>
                  <th scope="col">先方担当者</th>
                  <th scope="col">架電状況</th>
                  <th scope="col">最終架電入力者</th>
                  <th scope="col">検討時期</th>
                  <th scope="col">次回架電</th>
                  <th scope="col">次回アクション</th>
                  <th scope="col">ホール規模</th>
                  <th scope="col">表示</th>
                  <th scope="col">備考</th>
                </tr>
              </thead>
              <tbody id="venueTableBody"></tbody>
            </table>
          </div>
          <nav class="list-pagination" id="listPagination" aria-label="営業先一覧のページ送り" hidden>
            <button class="icon-button" id="previousPageButton" type="button" title="前のページ" aria-label="前のページ">&larr;</button>
            <span class="page-summary" id="pageSummary" aria-live="polite"></span>
            <label class="page-size-field">
              <span>表示件数</span>
              <select id="pageSizeSelect" aria-label="1ページの表示件数">
                <option value="50">50件</option>
                <option value="100">100件</option>
                <option value="200">200件</option>
              </select>
            </label>
            <button class="icon-button" id="nextPageButton" type="button" title="次のページ" aria-label="次のページ">&rarr;</button>
          </nav>
          <div class="empty-state" id="emptyState" hidden>
            <p>条件に合う営業先がありません。</p>
            <button class="secondary-button" id="resetListFiltersButton" type="button">条件をリセット</button>
          </div>
        </section>
      </main>
    </div>

    <dialog id="alertDialog" class="alert-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Required Checks</p>
            <h2>要確認リスト <span id="alertDialogCount">0件</span></h2>
          </div>
          <button class="ghost-icon" type="button" id="closeAlertDialogButton" title="閉じる" aria-label="閉じる">×</button>
        </div>
        <div class="alert-dialog-body">
          <p class="alert-dialog-note" id="alertDialogLead">通知対象に入っている施設を表示します。</p>
          <div class="alert-venue-list" id="alertVenueList"></div>
        </div>
        <div class="dialog-actions">
          <span></span>
          <button class="secondary-button" id="closeAlertListButton" type="button">閉じる</button>
        </div>
      </form>
    </dialog>

    <dialog id="venueDialog" class="venue-dialog">
      <form id="venueForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Venue Profile</p>
            <h2 id="formTitle">新規施設</h2>
          </div>
          <button class="ghost-icon" type="button" id="closeDialogButton" title="閉じる" aria-label="閉じる">×</button>
        </div>

        <div class="form-grid">
          <fieldset>
            <legend>基本情報</legend>
            <label>施設名<input name="facilityName" required /></label>
            <label>種別<input name="category" placeholder="文化会館、公会堂、劇場" /></label>
            <label>管理運営機関<input name="operator" placeholder="市、公益財団法人、指定管理者" /></label>
            <label>都道府県<input name="prefecture" /></label>
            <label>市区町村<input name="municipality" /></label>
            <label class="wide">住所<input name="address" /></label>
          </fieldset>

          <fieldset>
            <legend>連絡先</legend>
            <label>電話番号<input name="phone" inputmode="tel" /></label>
            <label>FAX<input name="fax" inputmode="tel" /></label>
            <label>アドレス<input name="email" inputmode="email" /></label>
            <label>Webサイト<input name="website" inputmode="url" /></label>
            <label>担当部署<input name="department" /></label>
            <label>先方担当者<input name="contactName" /></label>
          </fieldset>

          <fieldset>
            <legend>公演・ホール情報</legend>
            <label>主ホール名<input name="mainHallName" /></label>
            <label>客席数<input name="seatCount" inputmode="numeric" /></label>
            <label>大ホール席数<input name="largeHallSeats" inputmode="numeric" /></label>
            <label>中ホール席数<input name="mediumHallSeats" inputmode="numeric" /></label>
            <label>小ホール席数<input name="smallHallSeats" inputmode="numeric" /></label>
            <label>得意ジャンル<input name="genres" placeholder="演劇、音楽、舞踊、伝統芸能" /></label>
            <label>
              自主事業
              <select name="programPolicy">
                <option value="○">○</option>
                <option value="△">△</option>
                <option value="×">×</option>
              </select>
            </label>
            <label class="wide">備考<textarea name="notes" rows="4"></textarea></label>
          </fieldset>

          <fieldset>
            <legend>営業状況</legend>
            <label>
              状態
              <select name="status">
                <option value="未着手">未着手</option>
                <option value="情報収集中">情報収集中</option>
                <option value="初回連絡済">初回連絡済</option>
                <option value="提案中">提案中</option>
                <option value="見積・調整中">見積・調整中</option>
                <option value="成約">成約</option>
                <option value="保留">保留</option>
                <option value="架電NG">架電NG</option>
              </select>
            </label>
            <label>
              温度感
              <select name="priority">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
              </select>
            </label>
            <label>
              表示
              <select name="isHidden">
                <option value="false">表示</option>
                <option value="true">非表示</option>
              </select>
            </label>
            <label>
              営業担当
              <select name="assignedUserId"></select>
            </label>
            <label>最終接触日<input name="lastContactDate" type="date" /></label>
            <label>検討時期<input name="considerationDate" type="date" /></label>
            <label>次回架電日<input name="nextActionDate" type="date" /></label>
            <label>通知日数<input name="notificationLeadDays" type="number" min="0" max="365" placeholder="空欄は既定" /></label>
            <label class="wide">次回アクション<input name="nextAction" placeholder="文化事業担当へ電話、企画書送付など" /></label>
          </fieldset>
        </div>

        <div class="dialog-actions">
          <button class="danger-button" id="deleteVenueButton" type="button">削除</button>
          <span></span>
          <button class="secondary-button" type="button" id="cancelFormButton">キャンセル</button>
          <button class="primary-button" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="notesDialog" class="notes-dialog">
      <form id="notesForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Notes</p>
            <h2 id="notesTitle">備考</h2>
          </div>
          <button class="ghost-icon" type="button" id="closeNotesDialogButton" title="閉じる" aria-label="閉じる">×</button>
        </div>
        <div class="notes-editor">
          <label class="checkbox-line notes-important-line">
            <input id="notesImportantInput" type="checkbox" />
            <span>重要メモ</span>
          </label>
          <label>
            備考
            <textarea id="notesTextarea" rows="10" placeholder="架電内容、次回確認事項、先方の反応など"></textarea>
          </label>
        </div>
        <div class="dialog-actions">
          <span></span>
          <button class="secondary-button" id="cancelNotesButton" type="button">キャンセル</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script src="./cloud-config.js?v=20260521"></script>
    <script src="./cloud-client.js?v=20260722-hardening"></script>
    <script src="./app.js?v=20260722-hardening"></script>
  </body>
</html>
