name: kabu_web_next checks

on:
  push:
    paths:
      - 'kabu_web_next/**'
      - '.github/workflows/kabu-web-next-check.yml'
  pull_request:
    paths:
      - 'kabu_web_next/**'
      - '.github/workflows/kabu-web-next-check.yml'

jobs:
  next-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kabu_web_next
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: kabu_web_next/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
