name: kabu_web checks

on:
  push:
    paths:
      - 'kabu_web/**'
      - '.github/workflows/kabu-web-check.yml'
  pull_request:
    paths:
      - 'kabu_web/**'
      - '.github/workflows/kabu-web-check.yml'

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate kabu_web static deploy assets
        run: node kabu_web/scripts/check-static.mjs
